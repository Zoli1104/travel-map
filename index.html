<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Family Travel Map</title>
<meta name="theme-color" content="#0a1628">
<link rel="manifest" href="/manifest.json">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a1628;--surface:#0f1e35;--surface2:#162640;--border:rgba(255,255,255,0.07);--text:#e8f0fe;--muted:#4a6080}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:9px 14px;display:flex;align-items:center;gap:12px;flex-shrink:0;flex-wrap:wrap}
.logo{font-size:1rem;font-weight:700;white-space:nowrap}
.filters{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}
.fbtn{padding:5px 13px;border-radius:20px;border:none;font-size:0.78rem;font-weight:600;cursor:pointer;opacity:0.4;transition:all .2s;font-family:inherit}
.fbtn.active{opacity:1;transform:scale(1.05)}

.stats{background:var(--surface);border-bottom:1px solid var(--border);padding:7px 14px;display:flex;gap:18px;flex-shrink:0;overflow-x:auto}
.sitem{text-align:center;white-space:nowrap}
.sval{font-size:1.1rem;font-weight:700;line-height:1}
.slbl{font-size:0.6rem;color:var(--muted);margin-top:1px}

#mc{flex:1;position:relative;overflow:hidden}
#ms{width:100%;height:100%;cursor:grab}
#ms:active{cursor:grabbing}
.cp{stroke:rgba(255,255,255,0.1);stroke-width:0.3;transition:fill .3s;cursor:pointer}
.cp:hover{stroke:rgba(255,255,255,0.4);stroke-width:0.8}

.zc{position:absolute;bottom:18px;right:16px;display:flex;flex-direction:column;gap:6px}
.zb{width:40px;height:40px;border-radius:11px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.zb:hover{background:var(--surface2)}

.leg{position:absolute;bottom:18px;left:14px;background:rgba(10,22,40,.93);border:1px solid var(--border);border-radius:13px;padding:11px 13px;font-size:0.7rem;backdrop-filter:blur(8px)}
.ltit{font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-size:.6rem;margin-bottom:7px}
.li{display:flex;align-items:center;gap:6px;margin-bottom:3px;color:#94a3b8}
.ld{width:9px;height:9px;border-radius:50%;flex-shrink:0}

#tip{position:absolute;background:rgba(10,22,40,.97);border:1px solid rgba(255,255,255,.1);border-radius:11px;padding:9px 11px;pointer-events:none;font-size:0.75rem;max-width:230px;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,.4);display:none}
.th{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.tf{width:22px;height:15px;object-fit:cover;border-radius:2px}
.tn{font-weight:700;color:var(--text);font-size:.82rem}
.tv{display:flex;align-items:center;gap:4px;color:#94a3b8;margin-top:2px;font-size:.7rem;flex-wrap:wrap}
.tmd{width:13px;height:13px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.42rem;font-weight:700;color:#fff;flex-shrink:0}

.ov{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;display:flex;align-items:center;justify-content:center;padding:14px;backdrop-filter:blur(4px)}
.ov.hidden{display:none}

.mod{background:var(--surface);border-radius:18px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;border:1px solid var(--border);box-shadow:0 40px 80px rgba(0,0,0,.6)}
.mh{padding:18px 18px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;position:sticky;top:0;background:var(--surface);z-index:1}
.mflag{width:46px;height:32px;object-fit:cover;border-radius:5px;box-shadow:0 2px 8px rgba(0,0,0,.3);flex-shrink:0}
.mcn{font-size:1.25rem;font-weight:700}
.mcm{font-size:.68rem;color:var(--muted);margin-top:1px}
.xbtn{margin-left:auto;width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.xbtn:hover{background:var(--surface2);color:var(--text)}
.mb{padding:14px 18px 18px}
.slb{font-size:.62rem;font-weight:700;color:#3b82f6;text-transform:uppercase;letter-spacing:.1em;margin-bottom:9px}

.vl{display:flex;flex-direction:column;gap:7px;margin-bottom:12px}
.vc{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:11px;padding:10px 12px;display:flex;align-items:center;gap:9px}
.vms{display:flex;gap:3px;flex-shrink:0}
.vmd{width:23px;height:23px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:700;color:#fff;flex-shrink:0}
.vi{flex:1;min-width:0}
.vtt{font-size:.8rem;font-weight:600}
.vyt{font-size:.68rem;color:var(--muted);margin-top:1px}
.vbg{font-size:.6rem;font-weight:600;padding:3px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.bh{background:rgba(34,197,94,.15);color:#4ade80;border:1px solid rgba(34,197,94,.2)}
.bw{background:rgba(245,158,11,.15);color:#fbbf24;border:1px solid rgba(245,158,11,.2)}
.bt{background:rgba(168,85,247,.15);color:#c084fc;border:1px solid rgba(168,85,247,.2)}
.bo{background:rgba(148,163,184,.15);color:#94a3b8;border:1px solid rgba(148,163,184,.2)}
.delbtn{width:24px;height:24px;border-radius:6px;border:1px solid rgba(239,68,68,.2);background:rgba(239,68,68,.08);color:#f87171;font-size:.75rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.delbtn:hover{background:rgba(239,68,68,.2)}
.avbtn{width:100%;padding:9px;border-radius:11px;border:1px dashed rgba(59,130,246,.3);background:rgba(59,130,246,.05);color:#60a5fa;font-size:.8rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;margin-bottom:14px}
.avbtn:hover{background:rgba(59,130,246,.1)}

/* FORM */
.af{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:13px;padding:13px;margin-bottom:14px}
.fl{font-size:.68rem;color:var(--muted);font-weight:600;margin-bottom:6px}
.mcs{display:flex;gap:8px;margin-bottom:11px}
.mcb{cursor:pointer}
.mcb input{display:none}
.mcd{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:#fff;opacity:.35;transition:opacity .2s,transform .2s;cursor:pointer}
.mcb input:checked+.mcd{opacity:1;transform:scale(1.1)}
.fr{display:flex;gap:7px;margin-bottom:9px}
.fsel,.finp{flex:1;padding:7px 9px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.8rem;font-family:inherit;outline:none}
.fsel:focus,.finp:focus{border-color:rgba(59,130,246,.5)}

/* viackrat toggle */
.mtog{display:flex;align-items:center;gap:7px;margin-bottom:10px;cursor:pointer;user-select:none}
.tsw{width:34px;height:19px;background:var(--surface2);border-radius:10px;position:relative;transition:background .2s;flex-shrink:0;border:1px solid var(--border)}
.tsw.on{background:#3b82f6;border-color:#3b82f6}
.tsw::after{content:'';position:absolute;width:13px;height:13px;background:#fff;border-radius:50%;top:2px;left:2px;transition:left .2s}
.tsw.on::after{left:16px}
.tlbl{font-size:.76rem;color:var(--muted)}

.yearrow{display:flex;gap:7px;margin-bottom:9px}
.fbr{display:flex;gap:7px}
.bsave{flex:1;padding:8px;border-radius:9px;border:none;background:#3b82f6;color:#fff;font-size:.8rem;font-weight:600;cursor:pointer;font-family:inherit}
.bsave:hover{background:#2563eb}
.bcanc{padding:8px 14px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.8rem;cursor:pointer;font-family:inherit}

/* CONTINENTS */
.cs{border-top:1px solid var(--border);padding-top:13px;margin-top:4px}
.cr{margin-bottom:9px}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.cnl{font-size:.76rem;font-weight:600}
.cpl{font-size:.66rem;color:var(--muted);font-family:monospace}
.ptr{height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.ptf{height:100%;border-radius:3px;transition:width .6s ease}

@media(max-width:600px){
  .logo span{display:none}
  .fbtn{padding:4px 9px;font-size:.7rem}
  .leg{display:none}
  .zc{bottom:10px;right:10px}
  .zb{width:38px;height:38px}
}
</style>
</head>
<body>

<header>
  <div class="logo">✈️ <span>Family Travel Map</span></div>
  <div class="filters">
    <button class="fbtn active" data-f="all" onclick="setFilter('all')" style="background:#334155;color:#e2e8f0">🌍 Všetci</button>
    <button class="fbtn" data-f="zoli" onclick="toggleMember('zoli')" style="background:#0ea5e9;color:#fff">👤 Zoli</button>
    <button class="fbtn" data-f="veve" onclick="toggleMember('veve')" style="background:#ec4899;color:#fff">👤 Veve</button>
    <button class="fbtn" data-f="teo" onclick="toggleMember('teo')" style="background:#1e40af;color:#fff">👤 Teo</button>
  </div>
</header>

<div class="stats">
  <div class="sitem"><div class="sval" id="st">0</div><div class="slbl">Zobrazené</div></div>
  <div class="sitem"><div class="sval" id="sw" style="color:#94a3b8">0%</div><div class="slbl">sveta</div></div>
  <div class="sitem"><div class="sval" id="sz" style="color:#7dd3fc">0</div><div class="slbl">Zoli · <span id="szp">0%</span></div></div>
  <div class="sitem"><div class="sval" id="sv" style="color:#ec4899">0</div><div class="slbl">Veve · <span id="svp">0%</span></div></div>
  <div class="sitem"><div class="sval" id="steo" style="color:#60a5fa">0</div><div class="slbl">Teo · <span id="step">0%</span></div></div>
  <div class="sitem"><div class="sval" id="sa" style="color:#fbbf24">⭐ 0</div><div class="slbl">Všetci · <span id="sap">0%</span></div></div>
</div>

<div id="mc">
  <svg id="ms"></svg>
  <div class="zc">
    <button class="zb" onclick="zoomIn()">+</button>
    <button class="zb" onclick="zoomOut()">−</button>
    <button class="zb" onclick="zoomReset()">⌂</button>
  </div>
  <div class="leg">
    <div class="ltit">Legenda</div>
    <div class="li"><div class="ld" style="background:#7dd3fc"></div>Zoli</div>
    <div class="li"><div class="ld" style="background:#ec4899"></div>Veve</div>
    <div class="li"><div class="ld" style="background:#1e40af"></div>Teo</div>
    <div class="li"><div class="ld" style="background:#a855f7"></div>Zoli + Veve</div>
    <div class="li"><div class="ld" style="background:#f97316"></div>Zoli + Teo</div>
    <div class="li"><div class="ld" style="background:#ef4444"></div>Veve + Teo</div>
    <div class="li"><div class="ld" style="background:#f8fafc;border:1px solid #334155"></div>Všetci traja ⭐</div>
  </div>
  <div id="tip"></div>
</div>

<div class="ov hidden" id="ov" onclick="closeOv(event)">
  <div class="mod">
    <div class="mh">
      <img class="mflag" id="mfl" src="" alt="">
      <div>
        <div class="mcn" id="mcn"></div>
        <div class="mcm" id="mcm"></div>
      </div>
      <button class="xbtn" onclick="closeModal()">✕</button>
    </div>
    <div class="mb">
      <div class="slb">Návštevy</div>
      <div class="vl" id="vl"></div>
      <button class="avbtn" id="avbtn" onclick="showForm()">+ Pridať návštevu</button>

      <div class="af" id="af" style="display:none">
        <div class="fl">Kto bol?</div>
        <div class="mcs">
          <label class="mcb"><input type="checkbox" id="cbz"><div class="mcd" style="background:#0ea5e9">Z</div></label>
          <label class="mcb"><input type="checkbox" id="cbv"><div class="mcd" style="background:#ec4899">V</div></label>
          <label class="mcb"><input type="checkbox" id="cbt"><div class="mcd" style="background:#1e40af">T</div></label>
        </div>

        <div class="fl">Typ návštevy</div>
        <div class="fr">
          <select class="fsel" id="vtype">
            <option value="dovolenka">🏖️ Dovolenka</option>
            <option value="sluzobka">💼 Služobka</option>
            <option value="prestup">✈️ Prestup</option>
            <option value="ine">📍 Iné</option>
          </select>
        </div>

        <div class="fl">Počet návštev</div>
        <div class="fr">
          <select class="fsel" id="vcnt">
            <option value="1">1×</option>
            <option value="2">2×</option>
            <option value="3">3×</option>
            <option value="4">4×</option>
            <option value="5">5×</option>
            <option value="viac">Viackrát 🔁</option>
          </select>
        </div>

        <div class="fl" id="ylbl">Rok (voliteľné)</div>
        <div class="yearrow">
          <input type="number" class="finp" id="vy" placeholder="napr. 2024" min="1900" max="2099">
          <input type="number" class="finp" id="vly" placeholder="Posledný rok" min="1900" max="2099" style="display:none">
        </div>

        <div class="fbr">
          <button class="bsave" onclick="saveVisit()">Uložiť</button>
          <button class="bcanc" onclick="hideForm()">Zrušiť</button>
        </div>
      </div>

      <div class="cs" id="cs">
        <div class="slb" style="margin-bottom:12px">📊 Kontinenty</div>
        <div id="cbars"></div>
      </div>
    </div>
  </div>
</div>

,c:"Afrika"},"826":{name:"Spojené kráľovstvo",a2:"gb",c:"Európa"},"840":{name:"USA",a2:"us",c:"Amerika"},"858":{name:"Uruguaj",a2:"uy",c:"Amerika"},"860":{name:"Uzbekistan",a2:"uz",c:"Ázia"},"862":{name:"Venezuela",a2:"ve",c:"Amerika"},"887":{name:"Jemen",a2:"ye",c:"Ázia"},"894":{name:"Zambia",a2:"zm",c:"Afrika"},"626":{name:"Timor-Leste",a2:"tl",c:"Ázia"}};
const CCOUNTS={"Európa":44,"Ázia":48,"Afrika":54,"Amerika":35,"Oceánia":14};
const COL={z:'#7dd3fc',v:'#ec4899',t:'#1e40af',zv:'#a855f7',zt:'#f97316',vt:'#ef4444',all:'#f8fafc',none:'#1a2d4a'};
const MC={zoli:'#0ea5e9',veve:'#ec4899',teo:'#1e40af'};
const ML={zoli:'Z',veve:'V',teo:'T'};
const TL={dovolenka:'🏖️ Dovolenka',sluzobka:'💼 Služobka',prestup:'✈️ Prestup',ine:'📍 Iné'};
const BC={dovolenka:'bh',sluzobka:'bw',prestup:'bt',ine:'bo'};
const BL={dovolenka:'Dovolenka',sluzobka:'Služobka',prestup:'Prestup',ine:'Iné'};

let data={},filter='all',activeMembers=new Set(),curCode=null,svgZ;

function getMembers(code){
  const d=data[code];
  if(!d||!d.visits||!d.visits.length)return[];
  const s=new Set();
  d.visits.forEach(v=>(v.members||[]).forEach(m=>s.add(m)));
  return[...s];
}

function getColor(code){
  const m=getMembers(code);
  if(!m.length)return COL.none;
  if(filter==='all'){
    // Show full color combos
    const z=m.includes('zoli'),v=m.includes('veve'),t=m.includes('teo');
    if(z&&v&&t)return COL.all;
    if(z&&v)return COL.zv;
    if(z&&t)return COL.zt;
    if(v&&t)return COL.vt;
    if(z)return COL.z;
    if(v)return COL.v;
    if(t)return COL.t;
    return COL.none;
  }
  // Filter mode: show only countries where ALL selected members were
  const sel=[...activeMembers];
  if(!sel.every(s=>m.includes(s)))return COL.none;
  // Color based on selected combination
  const sz=sel.includes('zoli'),sv=sel.includes('veve'),st=sel.includes('teo');
  if(sz&&sv&&st)return COL.all;
  if(sz&&sv)return COL.zv;
  if(sz&&st)return COL.zt;
  if(sv&&st)return COL.vt;
  if(sz)return COL.z;
  if(sv)return COL.v;
  if(st)return COL.t;
  return COL.none;
}

async function loadData(){
  try{
    const snap=await db.collection('countries').get();
    data={};
    snap.forEach(d=>{data[d.id]=d.data()});
    colorMap();updateStats();
  }catch(e){console.error(e)}
}

async function saveDoc(code){
  try{
    if(!data[code]||!data[code].visits||!data[code].visits.length){
      await db.collection('countries').doc(code).delete();
      delete data[code];
    } else {
      await db.collection('countries').doc(code).set(data[code]);
    }
  }catch(e){console.error(e)}
  colorMap();updateStats();
}

function flag(a2){return`https://flagcdn.com/w40/${a2}.png`}

function initMap(){
  const svg=d3.select('#ms');
  const mc=document.getElementById('mc');
  const w=mc.clientWidth,h=mc.clientHeight;
  const proj=d3.geoNaturalEarth1().scale(w/6.5).translate([w/2,h/2]);
  const path=d3.geoPath().projection(proj);
  const g=svg.append('g');
  svgZ=d3.zoom().scaleExtent([1,8]).on('zoom',e=>g.attr('transform',e.transform));
  svg.call(svgZ);
  const tip=document.getElementById('tip');

  d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(world=>{
    g.selectAll('.cp')
      .data(topojson.feature(world,world.objects.countries).features)
      .enter().append('path')
      .attr('class','cp')
      .attr('d',path)
      .attr('data-id',d=>String(d.id).padStart(3,'0'))
      .style('fill',d=>getColor(String(d.id).padStart(3,'0')))
      .on('mousemove',function(e,d){
        const code=String(d.id).padStart(3,'0');
        const info=CD[code];if(!info)return;
        if(filter!=='all'&&!getMembers(code).includes(filter))return;
        const cd=data[code];
        let h=`<div class="th"><img class="tf" src="${flag(info.a2)}" onerror="this.style.display='none'"><span class="tn">${info.name}</span></div>`;
        if(cd&&cd.visits&&cd.visits.length){
          cd.visits.forEach(v=>{
            h+=`<div class="tv">`;
            (v.members||[]).forEach(m=>{h+=`<div class="tmd" style="background:${MC[m]||'#666'}">${ML[m]||'?'}</div>`});
            h+=`<span>${TL[v.type]||v.type}`;
            if(v.count&&v.count!=='1')h+=` · ${v.count==='viac'?'viackrát 🔁':v.count+'×'}`;
            if(v.count==='viac'&&v.lastYear)h+=` · posl. ${v.lastYear}`;
            else if(v.year)h+=` · ${v.year}`;
            h+=`</span></div>`;
          });
        }
        tip.innerHTML=h;tip.style.display='block';
        const r=mc.getBoundingClientRect();
        let x=e.clientX-r.left+12,y=e.clientY-r.top+12;
        if(x+240>w)x-=250;if(y+160>h)y-=160;
        tip.style.left=x+'px';tip.style.top=y+'px';
      })
      .on('mouseleave',()=>tip.style.display='none')
      .on('click',(e,d)=>{
        const code=String(d.id).padStart(3,'0');
        if(CD[code])openModal(code);
      });
    colorMap();
  });
}

function colorMap(){
  d3.selectAll('.cp').style('fill',function(){return getColor(d3.select(this).attr('data-id'))});
}

function updateStats(){
  const W=195;
  let shown=0,z=0,v=0,t=0,a=0;
  const sel=[...activeMembers];
  Object.keys(data).forEach(code=>{
    const m=getMembers(code);if(!m.length)return;
    const mz=m.includes('zoli'),mv=m.includes('veve'),mt=m.includes('teo');
    if(mz)z++;if(mv)v++;if(mt)t++;
    if(mz&&mv&&mt)a++;
    if(filter==='all'||sel.every(s=>m.includes(s)))shown++;
  });
  document.getElementById('st').textContent=shown;
  document.getElementById('sw').textContent=Math.round(shown/W*100)+'%';
  document.getElementById('sz').textContent=z;document.getElementById('szp').textContent=Math.round(z/W*100)+'%';
  document.getElementById('sv').textContent=v;document.getElementById('svp').textContent=Math.round(v/W*100)+'%';
  document.getElementById('steo').textContent=t;document.getElementById('step').textContent=Math.round(t/W*100)+'%';
  document.getElementById('sa').textContent='⭐ '+a;document.getElementById('sap').textContent=Math.round(a/W*100)+'%';
}

function setFilter(f){
  filter=f;
  activeMembers=new Set();
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.toggle('active',b.dataset.f===f));
  colorMap();updateStats();
}

function toggleMember(m){
  if(activeMembers.has(m)){
    activeMembers.delete(m);
  } else {
    activeMembers.add(m);
  }
  if(activeMembers.size===0){
    setFilter('all');
    return;
  }
  filter='members';
  document.querySelectorAll('.fbtn').forEach(b=>{
    if(b.dataset.f==='all') b.classList.remove('active');
    else b.classList.toggle('active', activeMembers.has(b.dataset.f));
  });
  colorMap();
  updateStats();
}

function openModal(code){
  curCode=code;
  const info=CD[code];
  document.getElementById('mfl').src=flag(info.a2);
  document.getElementById('mcn').textContent=info.name;
  document.getElementById('mcm').textContent=info.c;
  renderVisits();hideForm();renderContinents();
  document.getElementById('ov').classList.remove('hidden');
}

function closeModal(){document.getElementById('ov').classList.add('hidden');curCode=null}
function closeOv(e){if(e.target===document.getElementById('ov'))closeModal()}

function renderVisits(){
  const visits=data[curCode]?.visits||[];
  const vl=document.getElementById('vl');
  if(!visits.length){
    vl.innerHTML='<div style="color:var(--muted);font-size:.78rem;text-align:center;padding:10px 0">Žiadne návštevy</div>';
    return;
  }
  vl.innerHTML=visits.map((v,i)=>{
    const isViac=v.count==='viac'||v.multiple;
    const cntTxt=isViac?'viackrát 🔁':(v.count&&v.count!=='1'?v.count+'×':'');
    let yearTxt='';
    if(isViac&&v.lastYear)yearTxt=`posledná: ${v.lastYear}`;
    else if(v.year)yearTxt=v.year;
    const sub=[cntTxt,yearTxt].filter(Boolean).join(' · ');
    return`<div class="vc">
      <div class="vms">${(v.members||[]).map(m=>`<div class="vmd" style="background:${MC[m]||'#666'}">${ML[m]||'?'}</div>`).join('')}</div>
      <div class="vi">
        <div class="vtt">${TL[v.type]||v.type||'Návšteva'}</div>
        ${sub?`<div class="vyt">${sub}</div>`:''}
      </div>
      <div class="vbg ${BC[v.type]||'bo'}">${BL[v.type]||'Iné'}</div>
      <button class="delbtn" onclick="delVisit(${i})">✕</button>
    </div>`;
  }).join('');
}

async function delVisit(i){
  if(!data[curCode])return;
  data[curCode].visits.splice(i,1);
  await saveDoc(curCode);
  renderVisits();renderContinents();
}

function renderContinents(){
  const fm=filter==='all'?null:filter;
  const counts={};
  Object.keys(data).forEach(code=>{
    const info=CD[code];if(!info)return;
    const m=getMembers(code);
    if(fm&&!m.includes(fm))return;
    counts[info.c]=(counts[info.c]||0)+1;
  });
  const conts=['Európa','Ázia','Afrika','Amerika','Oceánia'];
  document.getElementById('cbars').innerHTML=conts.map(cn=>{
    const cnt=counts[cn]||0,total=CCOUNTS[cn],pct=Math.round(cnt/total*100);
    return`<div class="cr"><div class="ch"><span class="cnl">${cn}</span><span class="cpl">${pct}% · ${cnt}/${total}</span></div><div class="ptr"><div class="ptf" style="width:${pct}%;background:#3b82f6"></div></div></div>`;
  }).join('');
}

function showForm(){
  document.getElementById('af').style.display='block';
  document.getElementById('avbtn').style.display='none';
  ['cbz','cbv','cbt'].forEach(id=>document.getElementById(id).checked=false);
  document.getElementById('vtype').value='dovolenka';
  document.getElementById('vcnt').value='1';
  document.getElementById('vy').value='';
  document.getElementById('vly').value='';
  document.getElementById('vy').style.display='';
  document.getElementById('vly').style.display='none';
  document.getElementById('ylbl').textContent='Rok (voliteľné)';
  document.getElementById('vcnt').onchange=function(){
    const isViac=this.value==='viac';
    document.getElementById('vy').style.display=isViac?'none':'';
    document.getElementById('vly').style.display=isViac?'':'none';
    document.getElementById('ylbl').textContent=isViac?'Posledný rok (voliteľné)':'Rok (voliteľné)';
  };
}

function hideForm(){
  document.getElementById('af').style.display='none';
  document.getElementById('avbtn').style.display='block';
}

async function saveVisit(){
  const members=['zoli','veve','teo'].filter((_,i)=>document.getElementById(['cbz','cbv','cbt'][i]).checked);
  if(!members.length){alert('Vyber aspoň jedného!');return}
  const type=document.getElementById('vtype').value;
  const cnt=document.getElementById('vcnt').value;
  const isViac=cnt==='viac';
  const year=document.getElementById('vy').value;
  const lastYear=document.getElementById('vly').value;
  const visit={members,type,count:cnt};
  if(isViac&&lastYear)visit.lastYear=lastYear;
  if(!isViac&&year)visit.year=year;
  if(!data[curCode])data[curCode]={visits:[]};
  if(!data[curCode].visits)data[curCode].visits=[];
  data[curCode].visits.push(visit);
  await saveDoc(curCode);
  renderVisits();renderContinents();hideForm();
}

function zoomIn(){d3.select('#ms').transition().call(svgZ.scaleBy,1.5)}
function zoomOut(){d3.select('#ms').transition().call(svgZ.scaleBy,0.67)}
function zoomReset(){d3.select('#ms').transition().call(svgZ.transform,d3.zoomIdentity)}

window.addEventListener('load',()=>{initMap();loadData()});
window.addEventListener('resize',()=>{d3.select('#ms').selectAll('*').remove();initMap()});
</script>
</body>
</html>
